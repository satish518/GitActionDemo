name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - run: chmod +x gradlew
      - run: ./gradlew test

  ui-test:
    runs-on: ubuntu-latest  # 🔥 Fixed: Ubuntu is reliable for emulators
    needs: unit-test        # ✅ Run after unit tests pass

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - run: chmod +x gradlew

      - name: Run UI Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: google
          arch: x86_64
          ram: 2G
          disk: 2G
          disable-animations: true
          emulator-boot-timeout: 1800
          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot-load
            -no-snapshot-save
            -no-boot-anim
            -gpu swiftshader_indirect
          script: |
            adb wait-for-device -t 60
            adb shell input keyevent 82
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            ./gradlew connectedDebugAndroidTest

  build-apk:
    runs-on: ubuntu-latest
    needs: unit-test  # ✅ Only block on reliable unit tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk