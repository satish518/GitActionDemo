name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - run: chmod +x gradlew
      - run: ./gradlew test

  ui-test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - run: chmod +x gradlew

      - name: Run UI Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 28              # 🔥 more stable than 29/30
          target: default
          arch: x86

          disable-animations: true
          emulator-boot-timeout: 1500   # 🔥 increase more

          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -no-boot-anim
            -gpu swiftshader_indirect
            -accel off                 # 🔥 important for macOS runners

          script: |
            adb wait-for-device
            adb shell input keyevent 82
            ./gradlew connectedDebugAndroidTest

  build-apk:
    runs-on: ubuntu-latest
#    needs: unit-test   # ✅ don’t block on flaky UI test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk