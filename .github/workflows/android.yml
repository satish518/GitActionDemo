name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: chmod +x gradlew
      - run: ./gradlew test

  ui-test:
    runs-on: ubuntu-latest
    needs: unit-test   # 👈 runs after unit test
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          disable-animations: true
          script: ./gradlew connectedAndroidTest

  build-apk:
    runs-on: ubuntu-latest
    needs: [unit-test, ui-test]   # 👈 runs ONLY if both pass
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: chmod +x gradlew
      - run: ./gradlew assembleDebug
      - uses: actions/upload-artifact@v3
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk