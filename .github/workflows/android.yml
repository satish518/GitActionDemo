name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew test


  ui-test:
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Run UI Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29                 # ✅ lighter & stable
          target: default              # ✅ NOT google_apis
          arch: x86                    # ✅ faster boot than x86_64
          profile: Nexus 6

          disable-animations: true
          emulator-boot-timeout: 1200  # ✅ increase timeout

          emulator-options: >
            -no-window
            -no-audio
            -no-snapshot
            -no-boot-anim
            -gpu swiftshader_indirect

          script: |
            adb wait-for-device
            adb shell input keyevent 82
            ./gradlew connectedDebugAndroidTest


  build-apk:
    runs-on: ubuntu-latest
    needs: [unit-test, ui-test]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant Permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk