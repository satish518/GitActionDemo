name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Grant Permission
        run: chmod +x gradlew
      - name: Run Unit Tests
        run: ./gradlew test

  ui-test:
    # 🚀 Change to macOS to fix emulator boot failures
    runs-on: macos-latest
#    needs: unit-test
    steps:
      - uses: actions/checkout@v4

      # 🧹 Free up disk space (Critical for heavy emulator runs)
      - name: Free Disk Space
        run: |
          rm -rf /usr/local/lib/android # Removing pre-installed SDKs to use fresh ones
          df -h

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Run UI Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86
          profile: Nexus 6
          disable-animations: true
          emulator-boot-timeout: 1200 # Increased timeout for stability
          emulator-options: >
            -no-window
            -no-snapshot
            -noaudio
            -no-boot-anim
            -gpu swiftshader_indirect
          script: ./gradlew connectedDebugAndroidTest

  build-apk:
    runs-on: ubuntu-latest
    needs: [unit-test, ui-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Grant Permission
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
